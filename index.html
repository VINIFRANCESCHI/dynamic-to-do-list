<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 10px solid #333;
            font-family: Arial, Helvetica, sans-serif;
            background: #333;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
            text-transform: uppercase;
        }
        main {
            flex: auto;
            padding: 20px;
            background: #555;
            border-radius: 10px;
        }
        main ul {
            padding: 0;
            list-style: none;
        }
        main li {
            background-color: #fff;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 3px 3px 5px rgb(143, 141, 141);

        }
        footer {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        footer input {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 5px;
            background: #ffffff;
        }
        footer button {            
            padding: 0.5rem 1rem;
            background-color: #020202;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            box-shadow: 3px 3px 5px rgb(255, 253, 253);
        }
        footer button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tarefas</h1>
    </header>
    <main>
        <ul></ul>
    </main>
    <footer>
        <input>
        <button onclick="add()">adicionar</button>
    </footer>
    <script>
        
        //estado da aplicação
        const tarefas = ['Estudar HTML', 'Estudar CSS', 'Estudar JS',]

        //alteradores de estado
        function add() {
            const input = document.querySelector("input")
            const tarefa = input.value
            tarefas.push(tarefa)
            input.value = ""
            render()
        }

        //mostrar na tela
        function render() {
            const ul = document.querySelector("ul")
            ul.innerHTML = null

            tarefas.forEach(function(tarefa) {
                const li = document.createElement("li")
                li.innerText = tarefa
                ul.appendChild(li)
            })
        }
        
        //iniciar
        render()
    </script>
    
</body>
</html>
